# RAVEN Configuration Template
# Copy this file to config.yaml and fill in your credentials.
# The UI server reads ../model/config.yaml by default.

azure_openai:
  endpoint:    "https://<your-resource>.openai.azure.com/"
  api_key:     "<your-azure-openai-key>"
  api_version: "2025-04-01-preview"
  deployment:  "gpt-4o"

github:
  token: ""          # Optional PAT — avoids 60 req/hr rate limit on public repos

android:
  adb_path:               "C:/Users/<you>/AppData/Local/Android/Sdk/platform-tools/adb.exe"
  emulator_serial:        "emulator-5554"
  package_name:           ""       # overridden per-run by the UI
  launch_activity:        ""       # overridden per-run by the UI
  install_timeout_seconds: 180

tools:
  ffmpeg_path:  "ffmpeg"           # must be on PATH or absolute path
  joern_parse:  "joern-parse"      # set to full path if not on PATH
  joern_export: "joern-export"

runtime:
  workspace_dir:             "../model/.raven_runs"
  max_replay_attempts:       3
  frame_sample_count:        12
  static_top_k:              30
  max_logcat_bytes:          2000000
  max_ui_hierarchy_snapshots: 8
  max_hdg_files:             120
  hdg_expansion_bound:       2
  compact_json:              true
