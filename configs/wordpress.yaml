# RAVEN config — WordPress
# Emulator: Pixel29 (API 29, x86, Google Play), serial emulator-5554
# Note: WordPress requires a WordPress.com login on cold start.
# Most bugs will fall back to TF-IDF static analysis without replay.
#
# CLI usage (run from the raven_reproduction/ directory):
#   raven run --config configs/wordpress.yaml --issue-url <url> --skip-install

azure_openai:
  endpoint:    "https://<your-resource>.openai.azure.com/"
  api_key:     "<your-api-key>"
  api_version: "2025-04-01-preview"
  deployment:  "gpt-4o"

github:
  token: ""

android:
  adb_path:               "adb"
  emulator_serial:        "emulator-5554"
  package_name:           "org.wordpress.android"
  launch_activity:        "org.wordpress.android/.ui.WPLaunchActivity"
  apk_path:               "apks/wordpress/wpandroid-26.8.apk"
  install_timeout_seconds: 300

tools:
  ffmpeg_path:  "ffmpeg"
  joern_parse:  "joern-parse"
  joern_export: "joern-export"

runtime:
  workspace_dir:              ".raven_runs"
  max_replay_attempts:        3
  frame_sample_count:         12
  static_top_k:               30
  max_logcat_bytes:           2000000
  max_ui_hierarchy_snapshots: 8
  max_hdg_files:              120
  hdg_expansion_bound:        2
  compact_json:               true
