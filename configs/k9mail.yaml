# RAVEN config — K-9 Mail
# Emulator: Pixel29 (API 29, x86, Google Play), serial emulator-5554
# Note: K-9 Mail requires email account setup. Most bug flows will fall back
# to TF-IDF static analysis without dynamic replay.
#
# CLI usage (run from the raven_reproduction/ directory):
#   raven run --config configs/k9mail.yaml --issue-url <url> --skip-install

azure_openai:
  endpoint:    "https://<your-resource>.openai.azure.com/"
  api_key:     "<your-api-key>"
  api_version: "2025-04-01-preview"
  deployment:  "gpt-4o"

github:
  token: ""

android:
  adb_path:               "adb"
  emulator_serial:        "emulator-5554"
  package_name:           "com.fsck.k9"
  launch_activity:        "com.fsck.k9/.ui.LauncherShortcuts"
  apk_path:               "apks/k9mail/k9mail-20.0.apk"
  install_timeout_seconds: 180

tools:
  ffmpeg_path:  "ffmpeg"
  joern_parse:  "joern-parse"
  joern_export: "joern-export"

runtime:
  workspace_dir:              ".raven_runs"
  max_replay_attempts:        3
  frame_sample_count:         12
  static_top_k:               30
  max_logcat_bytes:           2000000
  max_ui_hierarchy_snapshots: 8
  max_hdg_files:              120
  hdg_expansion_bound:        2
  compact_json:               true
